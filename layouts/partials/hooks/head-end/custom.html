<script>
    // 找到所有 CSS 类名为 "grid grid-cols-2 gap-4 justify-between mt-6 dark:text-gray-300" 的 div
    var divs = document.querySelectorAll('.grid.grid-cols-2.gap-4.justify-between.mt-6.dark\\:text-gray-300');

    // 确保至少有一个这样的 div 存在
    if (divs.length > 0) {
        // 获取最后一个 div
        var lastDiv = divs[divs.length - 1];
        // 获取倒数第二个 div
        var secondLastDiv = divs[divs.length - 2];

        // 将倒数两个 div 中的文本颜色设置为白色
        lastDiv.style.color = 'white';
        secondLastDiv.style.color = 'white';
    }
</script>
